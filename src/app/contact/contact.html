<section id="contact" class="contact">

    <div class="contact__container">

        <div class="contact__content">

            <h2 class="contact__title">
                {{ 'contact.title' | translate }}
            </h2>

            <h3 class="contact__subtitle">
                {{ 'contact.subtitle' | translate }}
            </h3>

            <p class="contact__description">
                {{ 'contact.description' | translate }}
            </p>

            <p class="contact__cta">

                {{ 'contact.cta' | translate }}

                <a href="mailto:yourservice@mail.com?subject=Frontend%20Inquiry" class="contact__link">
                    {{ 'contact.ctaLink' | translate }}
                </a>.

            </p>

        </div>

        <form id="contact-form" class="contact__form" (ngSubmit)="sendEmail(contactForm)" #contactForm="ngForm">

            <input type="text" name="name" [placeholder]="'contact.form.name' | translate" class="contact__input"
                required ngModel>

            <input type="email" name="email" [placeholder]="'contact.form.email' | translate" class="contact__input"
                required ngModel>

            <textarea name="message" [placeholder]="'contact.form.message' | translate" class="contact__textarea"
                rows="6" required ngModel>
            </textarea>

            <div class="contact__checkbox">

                <input type="checkbox" id="privacy" class="contact__checkbox-input" required ngModel name="privacy">

                <label for="privacy" class="contact__checkbox-label">

                    {{ 'contact.form.privacyText' | translate }}

                    <a href="#" class="contact__privacy-link">
                        {{ 'contact.form.privacyLink' | translate }}
                    </a>

                    {{ 'contact.form.privacySuffix' | translate }}

                </label>

            </div>

            <!-- Success / Error Messages -->

            <p class="contact__success" *ngIf="successMessage">
                {{ successMessage }}
            </p>

            <p class="contact__error" *ngIf="errorMessage">
                {{ errorMessage }}
            </p>

            <button type="submit" class="contact__button">
                {{ 'contact.form.submit' | translate }}
            </button>

            <button type="button" class="contact__scroll-top" aria-label="Scroll to top" (click)="scrollTop()">
            </button>

        </form>

    </div>

</section>
