<section class="hero">
  <div class="hero__left">
    <div class="hero__image-placeholder">
      <img src="assets/images/pb10.png" alt="Portrait of Mohab Broha" />
    </div>
  </div>

  <div class="hero__right">
    <div class="hero__heading">
      <p class="hero__intro">
        {{ intro }}
      </p>

      <h1 class="hero__name">
        {{ name }}
      </h1>
    </div>

    <h2 class="hero__role hero__role--top">
      {{ roleTop }}
    </h2>

    <h2 class="hero__role hero__role--bottom">
      {{ roleBottom }}
    </h2>
  </div>

  <div class="hero__socials" aria-label="social links">
    <a
      href="https://github.com/MohaBroha"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="GitHub"
    >
      <img src="assets/images/Vector (3).png" alt="GitHub" />
    </a>

  <a href="mailto:mohabroha@mail.de" aria-label="Email">
    <img src="assets/images/Vector (4).png" alt="Email" />
</a>

    <a
      href="https://www.linkedin.com/in/moha-broha-aa34233b0/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="LinkedIn"
    >
      <img src="assets/images/Vector (5).png" alt="LinkedIn" />
    </a>
  </div>

  <div
    class="hero__scroll"
    [style.opacity]="1 - scrollY / 500"
    [style.transform]="'translateX(200%) translateY(' + scrollY * 0.5 + 'px)'"
  >
    <span>{{ 'hero.scroll' | translate }}</span>
  </div>
  <div
    class="hero__scroll--mobile"
    [style.opacity]="1 - scrollY / 1200"
    [style.transform]="'translateY(' + scrollY * 0.65 + 'px)'"
  >
    <div class="hero__scroll--mobile-inner">
      <img src="assets/images/Scroll down (1).png" alt="Scroll down" />
    </div>
  </div>
</section>
