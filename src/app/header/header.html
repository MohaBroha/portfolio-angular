<header class="header">

    <div class="header__logo">
        <img src="assets/images/Group.png" alt="Logo">

    </div>

    <nav class="header__nav">
        <ul>
            <li><a href="#about">{{ 'header.nav.about' | translate }}</a></li>
            <li><a href="#skills">{{ 'header.nav.skills' | translate }}</a></li>
            <li><a href="#work">{{ 'header.nav.work' | translate }}</a></li>
            <li class="header__lang">
                <span
                    class="header__lang-item"
                    [class.header__lang-item--active]="currentLang === 'de'"
                    (click)="switchLanguage('de')"
                >
                    {{ 'header.language.de' | translate }}
                </span>
                <span> / </span>
                <span
                    class="header__lang-item"
                    [class.header__lang-item--active]="currentLang === 'en'"
                    (click)="switchLanguage('en')"
                >
                    {{ 'header.language.en' | translate }}
                </span>
            </li>
        </ul>
    </nav>


</header>
