<footer class="site-footer" role="contentinfo">
  <div class="site-footer__inner">
    <a routerLink="/" class="site-footer__left">
      <img src="assets/images/favicon.png" alt="Logo" class="site-footer__logo" />
    </a>

    <div class="site-footer__center" aria-hidden="false">
<div class="site-footer__copyright" appSectionAnimation>
          {{ 'footer.copyright' | translate }}
      </div>

      <a class="site-footer__legal" routerLink="/legal-notice">
        {{ 'footer.legal' | translate }}
      </a>
    </div>

    <div class="site-footer__right" aria-label="social links">
      <a
        class="site-footer__icon"
        href="https://github.com/MohaBroha"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub"
      >
        <img src="assets/images/Vector (6).png" alt="GitHub" />
      </a>

      <a class="site-footer__icon" href="mailto:hello@example.com" aria-label="Email">
        <img src="assets/images/9. Email button.png" alt="Email" />
      </a>

      <a
        class="site-footer__icon"
        href="https://www.linkedin.com/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn"
      >
        <img src="assets/images/10. Linkedin button.png" alt="LinkedIn" />
      </a>
    </div>
  </div>
</footer>
